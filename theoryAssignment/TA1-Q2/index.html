<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Feedback Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="form-page">
        <section class="form-card">
            <h1>Course Feedback Form</h1>
            <p>Please fill out all fields before submitting your feedback.</p>

            <!-- Form uses novalidate so custom JavaScript validation can handle messages -->
            <form id="feedbackForm" novalidate>
                <div class="field-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" placeholder="Enter your name">
                    <small class="error" id="nameError"></small>
                </div>

                <div class="field-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email">
                    <small class="error" id="emailError"></small>
                </div>

                <div class="field-group">
                    <label for="rating">Rating (1 to 5)</label>
                    <select id="rating" name="rating">
                        <option value="">Select rating</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                    </select>
                    <small class="error" id="ratingError"></small>
                </div>

                <div class="field-group">
                    <label for="comments">Comments</label>
                    <textarea id="comments" name="comments" rows="4" placeholder="Write your comments..."></textarea>
                    <small class="error" id="commentsError"></small>
                </div>

                <button type="submit">Submit Feedback</button>
                <p id="successMessage" class="success"></p>
            </form>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
