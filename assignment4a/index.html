<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pocket Tasks</title>
  <link rel="stylesheet" href="https://code.jquery.com/mobile/1.4.5/jquery.mobile-1.4.5.min.css" />
  <link rel="stylesheet" href="styles.css" />
  <script src="app.js"></script>
</head>
<body>
  <div data-role="page" id="home" class="app-page">
    <div data-role="header" data-position="fixed" class="app-header">
      <h1>Pocket Tasks</h1>
    </div>

    <div role="main" class="ui-content app-content">
      <section class="hero">
        <h2>Plan your day in 30 seconds</h2>
        <p>Add tasks, mark them done, and keep your momentum going.</p>
      </section>

      <form id="taskForm" class="task-form">
        <label for="taskText">Task</label>
        <input type="text" id="taskText" placeholder="Example: Finish jQuery assignment" required />

        <label for="taskPriority">Priority</label>
        <select id="taskPriority" data-native-menu="false">
          <option value="High">High</option>
          <option value="Medium" selected>Medium</option>
          <option value="Low">Low</option>
        </select>

        <button type="submit" class="ui-btn ui-corner-all ui-btn-b">Add Task</button>
      </form>

      <div class="stats-row">
        <div class="stat-box">
          <span id="totalCount">0</span>
          <small>Total</small>
        </div>
        <div class="stat-box">
          <span id="doneCount">0</span>
          <small>Done</small>
        </div>
        <div class="stat-box">
          <span id="pendingCount">0</span>
          <small>Pending</small>
        </div>
      </div>

      <ul id="taskList" data-role="listview" data-inset="true" class="task-list"></ul>
    </div>

    <div data-role="footer" data-position="fixed" class="app-footer">
      <div data-role="navbar">
        <ul>
          <li><a href="#home" class="ui-btn-active">Tasks</a></li>
          <li><a href="#" id="clearDoneBtn">Clear Done</a></li>
        </ul>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-1.11.1.min.js"></script>
  <script src="https://code.jquery.com/mobile/1.4.5/jquery.mobile-1.4.5.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
