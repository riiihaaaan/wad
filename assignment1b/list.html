<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registered Users</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="form-window table-window">
        <header class="window-header">
            <div class="window-dots">
                <span class="control-dot dot-red"></span>
                <span class="control-dot dot-yellow"></span>
                <span class="control-dot dot-green"></span>
            </div>
            <a href="index.html" class="icon-btn" aria-label="Back to form" title="Back to form">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
            </a>
        </header>

        <div class="divider"></div>

        <section class="table-content">
            <h2 class="table-title">Registered Users</h2>

            <div class="table-wrap">
                <table class="users-table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Password</th>
                        </tr>
                    </thead>
                    <tbody id="userTable"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script>
        const users = JSON.parse(localStorage.getItem("users")) || [];
        const tableBody = document.getElementById("userTable");

        if (!users.length) {
            tableBody.innerHTML = '<tr><td colspan="3" class="empty-row">No users registered yet.</td></tr>';
        } else {
            users.forEach((user) => {
                const row = document.createElement("tr");
                row.innerHTML = `
                    <td>${user.name || ""}</td>
                    <td>${user.email || ""}</td>
                    <td>${user.password || ""}</td>
                `;
                tableBody.appendChild(row);
            });
        }
    </script>
</body>
</html>
