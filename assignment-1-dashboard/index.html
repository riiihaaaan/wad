<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .sidebar { height: 100vh; background-color: #343a40; color: white; padding-top: 20px; }
        .sidebar a { color: white; text-decoration: none; display: block; padding: 10px; }
        .sidebar a:hover { background-color: #495057; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <nav class="col-md-2 sidebar">
                <h4 class="text-center">Admin Panel</h4>
                <a href="#">Dashboard</a>
                <a href="#">Students</a>
                <a href="#">Exams</a>
                <a href="#">Settings</a>
            </nav>

            <!-- Main Content -->
            <main class="col-md-10 p-4">
                <h2>College/Exam Dashboard</h2>
                
                <div class="row mt-4">
                    <!-- Cards -->
                    <div class="col-md-4">
                        <div class="card text-white bg-primary mb-3">
                            <div class="card-body">
                                <h5 class="card-title">Total Students</h5>
                                <p class="card-text fs-2">1,250</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card text-white bg-success mb-3">
                            <div class="card-body">
                                <h5 class="card-title">Exams Completed</h5>
                                <p class="card-text fs-2">45</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card text-white bg-warning mb-3">
                            <div class="card-body">
                                <h5 class="card-title">Pending Results</h5>
                                <p class="card-text fs-2">12</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Table -->
                <h4 class="mt-4">Recent Registrations</h4>
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Course</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td>1</td><td>John Doe</td><td>Computer Engg</td><td>Active</td></tr>
                        <tr><td>2</td><td>Jane Smith</td><td>IT</td><td>Active</td></tr>
                        <tr><td>3</td><td>Mike Johnson</td><td>Mechanical</td><td>Pending</td></tr>
                    </tbody>
                </table>
            </main>
        </div>
    </div>
</body>
</html>
